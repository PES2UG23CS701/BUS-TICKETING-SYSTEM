<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation - Bus Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .booking-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #333;
        }
        .detail-row:last-child {
            margin-bottom: 0;
            border-top: 2px solid #ddd;
            padding-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
        .detail-label {
            color: #666;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="success-icon">✅</div>
    <h2>Booking Confirmed!</h2>
    
    <div class="booking-details" id="bookingInfo">
        <div class="detail-row">
            <span class="detail-label">Booking ID:</span>
            <span id="bookingId">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Seat Number:</span>
            <span id="seatNum">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Travel Date:</span>
            <span id="travelDate">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Total Amount:</span>
            <span id="totalAmount">₹-</span>
        </div>
    </div>

    <button onclick="goToPayment()">Proceed to Payment</button>
</div>

<script>
    window.onload = function() {
        loadBookingDetails();
    };

    function loadBookingDetails() {
        let bookingId = localStorage.getItem("bookingId");
        let seatNumber = localStorage.getItem("seatNumber");
        let travelDate = localStorage.getItem("travelDate");
        let price = localStorage.getItem("bookingPrice");

        if (bookingId) {
            document.getElementById("bookingId").innerText = bookingId;
            document.getElementById("seatNum").innerText = seatNumber || "N/A";
            document.getElementById("travelDate").innerText = travelDate || "N/A";
            document.getElementById("totalAmount").innerText = "₹" + (price || "0");
        }
    }

    function goToPayment() {
        window.location.href = "/payment";
    }
</script>
</body>
</html>
